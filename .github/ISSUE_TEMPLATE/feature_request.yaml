name: Feature request
description: Suggest an idea for this app
assignees: 
- AndreasTar
title: "[FEATURE] <title>"
labels: feature
body:
  - type: textarea
    id: description
    attributes:
      label: Feature description
      placeholder: "Example: Add widget that shows rabbits."
      description: A clear and concise description of what you want added.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Reason for adding this feature
      description: Why do you want this feature added to the game
      placeholder: "Example: Rabbits are my favourite animal."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternative solutions / Relevant existing functionality
      placeholder: "Example: There is a widget that shows squirrels, and I want rabbits too."
      description: A clear and concise description of alternative features that could be added alongside, or any relevant existing functionality that already exists in-game.
    validations:
      required: true
  - type: upload
    id: screenshots
    attributes:
      label: Upload relevant screenshots
      description: Drag and drop any relevant screenshots or files.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: "I want this to only show when its Tuesday."
      description: Any other context about the problem that we should know about.
    validations:
      required: false
